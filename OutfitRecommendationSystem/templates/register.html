{% extends 'base.html' %}

{% block content %}
<section class="text-center">
    <h2 class="display-5 text-primary fw-bold mb-4">Register</h2>
    <p class="lead text-muted mb-4">Create an account to get personalized recommendations.</p>
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm text-start">
                <div class="card-body p-4">
                    <form action="{{ url_for('register') }}" method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required minlength="3" placeholder="Choose a username">
                            <div class="form-text">Must be at least 3 characters.</div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required minlength="6" placeholder="Choose a password">
                            <div class="form-text">Must be at least 6 characters.</div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                            <i class="bi bi-person-plus me-2"></i>Register
                        </button>
                    </form>
                    <div class="text-center mt-3">
                        <p class="mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none">Log in here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
